services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: honorare
      POSTGRES_USER: honorare
      POSTGRES_PASSWORD: honorare_dev
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honorare"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=honorare;Username=honorare;Password=honorare_dev"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  admin-web:
    build:
      context: ../apps/admin-web
      dockerfile: Dockerfile
      args:
        BASE_HREF: /admin/
    ports:
      - "4200:80"

  medico-pwa:
    build:
      context: ../apps/medico-pwa
      dockerfile: Dockerfile
      args:
        BASE_HREF: /app/
    ports:
      - "4201:80"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - admin-web
      - medico-pwa
