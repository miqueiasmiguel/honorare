services:
  # ── Observability stack ───────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.0
    command: ["--config=/etc/otel/collector.yml"]
    volumes:
      - ./otel/collector.yml:/etc/otel/collector.yml:ro
    ports:
      - "4317:4317" # OTLP gRPC (app → collector)
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus metrics scrape endpoint

  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI

  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:3.0.0
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000" # Grafana UI
    depends_on:
      - prometheus
      - jaeger
      - loki

  # ── Application ───────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: honorare
      POSTGRES_USER: honorare
      POSTGRES_PASSWORD: honorare_dev
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honorare"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
      network: host
    env_file:
      - path: .env
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=honorare;Username=honorare;Password=honorare_dev"
      Otlp__Endpoint: "http://otel-collector:4317"
      Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  admin-web:
    build:
      context: ..
      dockerfile: apps/admin-web/Dockerfile
      network: host
      args:
        BASE_HREF: /admin/

  medico-pwa:
    build:
      context: ..
      dockerfile: apps/medico-pwa/Dockerfile
      network: host
      args:
        BASE_HREF: /app/

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - admin-web
      - medico-pwa

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
