# Override para deploy no homelab.
#
# Uso (na máquina do homelab, junto com base + prod):
#   docker compose \
#     -f docker-compose.yml \
#     -f docker-compose.prod.yml \
#     -f docker-compose.homelab.yml up -d
#
# Contém apenas as políticas de restart — sem isso um container que pare
# (ex.: SIGTERM, OOM, reboot da máquina) não volta sozinho, como ocorreu na VPS.
#
# O Cloudflare Tunnel ficou num override separado (docker-compose.tunnel.yml),
# adicionado a este comando quando for ativar acesso externo. Enquanto o deploy
# for LAN-only, não inclua o tunnel — assim não é preciso TUNNEL_TOKEN.

services:
  nginx:
    restart: unless-stopped

  backend:
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  admin-web:
    restart: unless-stopped

  medico-pwa:
    restart: unless-stopped
