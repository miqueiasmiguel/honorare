# Override de produção.
#
# PRINCÍPIO DE PORTAS: em produção, atrás do nginx (proxy reverso), o ÚNICO
# serviço que publica porta no host é o nginx. Todo o resto conversa pela rede
# interna do Docker (backend↔postgres↔otel↔...), sem porta no host — assim o
# Honorare nunca colide com os outros serviços do homelab.
#
# ATENÇÃO: `ports: []` NÃO limpa as portas do base — o Compose CONCATENA listas
# de ports. É preciso o tag `!override` (Compose 2.20+) para realmente remover.
#
# A porta do nginx é configurável via NGINX_PORT (default 8080) para você
# escolher uma livre no host. Quando o Cloudflare Tunnel estiver ativo, o
# cloudflared alcança o nginx pela rede Docker (http://nginx:80) e o nginx nem
# precisa publicar porta — aí dá pra usar `ports: !override []` nele também.

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: !override []

  backend:
    image: gitea.m2sf.duckdns.org/miqueiasfilho/backend:latest
    ports: !override [] # nginx faz proxy para backend:8080 pela rede interna
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=honorare;Username=honorare;Password=${POSTGRES_PASSWORD}"

  admin-web:
    image: gitea.m2sf.duckdns.org/miqueiasfilho/admin-web:latest

  medico-pwa:
    image: gitea.m2sf.duckdns.org/miqueiasfilho/medico-pwa:latest

  nginx:
    # Único serviço exposto no host. Porta configurável (default 8080).
    ports: !override
      - "${NGINX_PORT:-8080}:80"

  otel-collector:
    ports: !override []

  jaeger:
    ports: !override []

  prometheus:
    ports: !override []

  loki:
    ports: !override []

  grafana:
    environment:
      # Acesso exige login (anônimo desligado, formulário habilitado).
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      # Senha do usuário admin inicial (default "admin" força troca no 1º acesso).
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # Servido sob https://honorare.m2sf.com.br/grafana — o nginx encaminha o
      # prefixo /grafana e o Grafana monta links/assets a partir dele.
      GF_SERVER_ROOT_URL: "https://honorare.m2sf.com.br/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    ports: !override []
