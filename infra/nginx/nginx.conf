events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Resolver embutido do Docker. Quando combinado com uma variável em
  # `proxy_pass`, força o nginx a resolver o nome do serviço em cada request,
  # evitando que IPs fiquem em cache após `docker compose up --build` recriar
  # os containers de upstream.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Mapa para upgrade de conexão WebSocket. O Grafana Live (streaming de
  # dashboards) usa WS em /grafana/api/live/ws; sem o header Connection correto
  # a conexão cai para polling. Quando não há header Upgrade na request, emite
  # "close" para não atrapalhar requisições HTTP normais.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;

    # O nginx é publicado numa porta não-padrão no host (NGINX_PORT, ex.: 8090)
    # mapeada para a 80 interna. Com redirects absolutos (padrão), o nginx
    # montaria o Location com a porta INTERNA (80), descartando a 8090 — o
    # navegador acabaria na porta 80, servida por outro proxy do homelab
    # (openresty → 404). Redirects relativos preservam host:porta da requisição.
    absolute_redirect off;

    # Backend API
    location /api/ {
      set $upstream_endpoint backend:8080;
      proxy_pass         http://$upstream_endpoint;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      # Todo acesso público chega pelo Cloudflare Tunnel, sempre via HTTPS.
      # Hardcodar evita depender de detecção de esquema (o salto interno
      # cloudflared→nginx é http) — o backend precisa enxergar https para
      # construir o redirect_uri do OAuth e marcar os cookies como Secure.
      proxy_set_header   X-Forwarded-Proto https;
      proxy_set_header   X-Forwarded-Host $host;
    }

    # Admin SPA — index.html nunca em cache (garante hashes corretos após rebuild)
    location = /admin/index.html {
      set $upstream_endpoint admin-web:80;
      proxy_pass         http://$upstream_endpoint/index.html;
      proxy_set_header   Host $host;
      proxy_hide_header  Cache-Control;
      add_header         Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Admin SPA — serve index.html para qualquer rota (client-side routing).
    # `rewrite` remove o prefixo /admin/ — sem isso, o uso de variável em
    # proxy_pass desativaria o stripping automático que o nginx aplicaria a
    # uma proxy_pass estática.
    location /admin/ {
      set $upstream_endpoint admin-web:80;
      rewrite ^/admin/(.*)$ /$1 break;
      proxy_pass         http://$upstream_endpoint;
      proxy_set_header   Host $host;
      proxy_intercept_errors on;
      error_page 404 = /admin/index.html;
    }

    # Médico PWA — index.html nunca em cache
    location = /app/index.html {
      set $upstream_endpoint medico-pwa:80;
      proxy_pass         http://$upstream_endpoint/index.html;
      proxy_set_header   Host $host;
      proxy_hide_header  Cache-Control;
      add_header         Cache-Control "no-cache, no-store, must-revalidate";
      add_header         Service-Worker-Allowed /app/;
    }

    # Médico PWA — Service Worker precisa do header correto
    location /app/ {
      set $upstream_endpoint medico-pwa:80;
      rewrite ^/app/(.*)$ /$1 break;
      proxy_pass         http://$upstream_endpoint;
      proxy_set_header   Host $host;
      add_header         Service-Worker-Allowed /app/;
      proxy_intercept_errors on;
      error_page 404 = /app/index.html;
    }

    # Grafana — servido a partir do sub-path /grafana (GF_SERVER_SERVE_FROM_SUB_PATH
    # = true). O prefixo NÃO é removido: o próprio Grafana espera receber /grafana/
    # nas URLs. Autenticação é feita pelo login do Grafana (anônimo desligado em
    # prod via docker-compose.prod.yml).
    location /grafana/ {
      set $upstream_endpoint grafana:3000;
      proxy_pass         http://$upstream_endpoint;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto https;
      proxy_set_header   X-Forwarded-Host $host;
      # WebSocket (Grafana Live)
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
    }

    location = / {
      return 301 /admin/;
    }
  }
}
