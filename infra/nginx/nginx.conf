events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  upstream backend {
    server backend:8080;
  }

  upstream admin_web {
    server admin-web:80;
  }

  upstream medico_pwa {
    server medico-pwa:80;
  }

  server {
    listen 80;

    # Backend API
    location /api/ {
      proxy_pass         http://backend;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Admin SPA — serve index.html para qualquer rota (client-side routing)
    location /admin/ {
      proxy_pass         http://admin_web/;
      proxy_set_header   Host $host;
      proxy_intercept_errors on;
      error_page 404 = /admin/index.html;
    }

    # Médico PWA — Service Worker precisa do header correto
    location /app/ {
      proxy_pass         http://medico_pwa/;
      proxy_set_header   Host $host;
      add_header         Service-Worker-Allowed /app/;
      proxy_intercept_errors on;
      error_page 404 = /app/index.html;
    }

    location = / {
      return 301 /admin/;
    }
  }
}
