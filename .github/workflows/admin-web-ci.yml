name: Admin Web CI

on:
  push:
    paths:
      - "apps/admin-web/**"
      - "packages/api-contracts/**"
      - ".github/workflows/admin-web-ci.yml"
  pull_request:
    paths:
      - "apps/admin-web/**"
      - "packages/api-contracts/**"
      - ".github/workflows/admin-web-ci.yml"

jobs:
  test:
    name: Lint, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm -F admin-web prettier:check

      - name: ESLint
        run: pnpm -F admin-web lint

      - name: StyleLint
        run: pnpm -F admin-web stylelint

      - name: Test with coverage
        run: pnpm -F admin-web test:ci

      - name: Enforce 80% coverage threshold
        run: |
          SUMMARY="apps/admin-web/coverage/coverage-summary.json"
          if [ ! -f "$SUMMARY" ]; then
            echo "::error::Coverage summary not found at $SUMMARY"
            exit 1
          fi
          LINES=$(node -e "const c=require('./$SUMMARY').total.lines.pct; console.log(c)")
          echo "Line coverage: ${LINES}%"
          node -e "
            const pct = require('./$SUMMARY').total.lines.pct;
            if (pct < 80) { console.error('Coverage ' + pct + '% is below the required 80% threshold.'); process.exit(1); }
          "

      - name: Build
        run: pnpm -F admin-web build --base-href /admin/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: admin-web-coverage
          path: apps/admin-web/coverage/
