version: 2

updates:
  # Root npm (husky, lint-staged)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # admin-web Angular SPA
  - package-ecosystem: "npm"
    directory: "/apps/admin-web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "zone.js"
      angular-eslint:
        patterns:
          - "angular-eslint"
          - "typescript-eslint"
          - "@eslint/js"
          - "eslint*"
      stylelint:
        patterns:
          - "stylelint*"

  # medico-pwa Angular PWA
  - package-ecosystem: "npm"
    directory: "/apps/medico-pwa"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "zone.js"
      angular-eslint:
        patterns:
          - "angular-eslint"
          - "typescript-eslint"
          - "@eslint/js"
          - "eslint*"
      stylelint:
        patterns:
          - "stylelint*"

  # .NET backend
  - package-ecosystem: "nuget"
    directory: "/apps/backend/App"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      opentelemetry:
        patterns:
          - "OpenTelemetry*"
      entityframework:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
          - "Npgsql.EntityFrameworkCore*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
